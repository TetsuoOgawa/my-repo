name: Test

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore My-Repo.sln

      - name: Build
        run: dotnet build My-Repo.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Excellent.Tests/Excellent.Tests.csproj --configuration Release --no-build --verbosity normal
